<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Document Title</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="d-flex flex-column gap-3 justify-content-center align-items-center" style="height: 100vh;">    
        
        <div class="justify-content-center align-items-center me-3 border border-white" style="text-align: center;">
            <button id="clickButton" onclick="ClickCounter();" type="button" class="btn btn-danger btn-lg p-4 fw-bold">
                click?
            </button>
            <div id="clicks" class="text-center p-4 me-3 border border-white" style="text-align: center;">
                0
            </div>
        </div>

<!-- sidebar for upgrades -->
        <div class="sidebar">
            <button onclick="addClicker()">  <!-- clicker upgrade -->
                Buy Clicker 
                <p id="clickerUpgrade"></p>
            </button>
            <button onclick="addClicker2()">  <!-- clicker upgrade -->
                Buy Mouse Spam 
                <p id="clickerUpgrade2"></p>
            </button>
            <button onclick="addClicker3()">  <!-- clicker upgrade -->
                Buy Auto Clicker 
                <p id="clickerUpgrade3"></p>
            </button>
            <button onclick="addClicker4()">  <!-- click upgrade -->
                Buy Click Server
                <p id="clickerUpgrade4"></p>
            </button>
        </div>

        <!-- sidebar for upgrades on rightside -->

        <div class="sidebar-right">
            <button onclick="buyEnhancement1()">  <!-- auto multiplier upgrade -->
                Buy Multiplier for 750
                <p id="enhancement1"></p>
            </button>
        </div>



        <!-- button for click upgrade -->
        <div>
            <button onclick="clickUpgrade()">  <!-- click upgrade -->
                Buy Click Upgrade
            </button>
            <p id="clickUpgrade"></p>
        </div>  

        <!-- sidebar ends   -->
        <button id = "colorChange" onclick="changeBackgroundCustom()" class="btn btn-primary">
            Change Background Color
        </button>

        
    </div>
    <script src="script.js"></script>
</body>
</html>
